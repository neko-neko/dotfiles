pipeline: feature-dev
version: 1

phases:
  - id: design
    phase_file: phases/phase-01-design.md
    done_criteria: done-criteria/phase-01-design.md
    skip: false
    produces:
      - spec_file
      - investigation_record

  - id: spec-review
    phase_file: phases/phase-02-spec-review.md
    done_criteria: done-criteria/phase-02-spec-review.md
    skip: false
    produces:
      - review_report

  - id: plan
    phase_file: phases/phase-03-plan.md
    done_criteria: done-criteria/phase-03-plan.md
    skip: false
    produces:
      - implementation_plan
      - test_cases

  - id: plan-review
    phase_file: phases/phase-04-plan-review.md
    done_criteria: done-criteria/phase-04-plan-review.md
    skip: false
    produces:
      - review_report

  - id: execute
    phase_file: phases/phase-05-execute.md
    done_criteria: done-criteria/phase-05-execute.md
    skip: false
    produces:
      - code_changes
      - test_results
      - evidence_collection

  - id: smoke-test
    phase_file: phases/phase-06-smoke-test.md
    done_criteria: done-criteria/phase-06-smoke-test.md
    skip_unless: --smoke
    produces:
      - smoke_test_results
      - vrt_diff

  - id: doc-audit
    phase_file: phases/phase-07-doc-audit.md
    done_criteria: done-criteria/phase-07-doc-audit.md
    skip_unless: --doc
    produces:
      - doc_audit_report

  - id: review
    phase_file: phases/phase-08-review.md
    done_criteria: done-criteria/phase-08-review.md
    skip: false
    produces:
      - review_findings

  - id: integrate
    phase_file: phases/phase-09-integrate.md
    done_criteria: done-criteria/phase-09-integrate.md
    skip: false
    handover: never
    produces:
      - merged_branch
      - pr_url

regate:
  verification_chain: [execute, smoke-test, review]

  review_findings:
    strategy_file: regate/review-findings.md
    rewind_to: execute

  test_failure:
    strategy_file: regate/test-failure.md
    rewind_to: execute

  audit_failure:
    strategy_file: regate/audit-failure.md
    rewind_to: current
    max_retries: 3

settings:
  default_handover: always
  max_phase_retries: 3
  linear_sync: auto
  context_budget:
    orchestrator: 150
    phase: 100
    references: 200
