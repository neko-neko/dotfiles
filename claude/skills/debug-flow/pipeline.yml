# yaml-language-server: $schema=../../workflow-engine/schema/pipeline.schema.json
pipeline: debug-flow
version: 3

modules:
  - audit
  - autonomy
  - regate
  - resume
  - phase-summary
  - context-budget

artifacts:
  rca_report:
    type: file
    pattern: "docs/debug/{date}-*-rca.md"
    produced_by: rca
    consumed_by: [fix-plan, fix-plan-review]
    contract:
      verification:
        - { check: file_exists, target: "{pattern}" }
        - { check: git_committed, target: "{pattern}" }
        - { check: sections_present, sections: [symptoms, investigation, root-cause, fix-strategy, evidence-plan] }
      validation:
        - { question: "根本原因がコードベースの実態と整合しているか", against: codebase }
        - { question: "Fix Strategy が根本原因を解決するアプローチか", against: codebase }

  reproduction_test:
    type: file
    produced_by: rca
    consumed_by: [execute]
    contract:
      verification:
        - { check: test_fails }
        - { check: git_committed }
      validation:
        - { question: "テストが根本原因のメカニズムを正確に再現しているか", against: rca_report }

  fix_plan:
    type: file
    pattern: "docs/plans/{date}-*-fix-plan.md"
    produced_by: fix-plan
    consumed_by: [fix-plan-review, execute]
    contract:
      verification:
        - { check: file_exists, target: "{pattern}" }
        - { check: git_committed, target: "{pattern}" }
      validation:
        - { question: "Fix Strategy の全項目がタスクに分解されているか", against: rca_report }
        - { question: "タスク依存関係が実装順序として妥当か", against: codebase }

  test_cases:
    type: file
    produced_by: fix-plan
    consumed_by: [fix-plan-review, execute]
    contract:
      verification:
        - { check: file_exists }
      validation:
        - { question: "テストケースが Given/When/Then で具体化されているか", against: rca_report }

  code_changes:
    type: git_range
    produced_by: execute
    consumed_by: [accept-test, doc-audit, review, integrate]
    contract:
      verification:
        - { check: build_passes }
        - { check: tests_pass }
        - { check: lint_clean }
      validation:
        - { question: "修正が根本原因を正しく解決しているか", against: [rca_report, fix_plan] }
        - { question: "新規テストが根本原因のメカニズムを検証しているか（非トートロジー）", against: rca_report }

  test_results:
    type: inline
    produced_by: execute
    consumed_by: [review]
    contract:
      verification:
        - { check: no_failures }
      validation: []

  evidence_collection:
    type: file
    produced_by: execute
    consumed_by: [review]
    contract:
      verification:
        - { check: file_exists }
      validation: []

  accept_test_results:
    type: file
    produced_by: accept-test
    consumed_by: []
    contract:
      verification:
        - { check: file_exists }
      validation:
        - { question: "テストシナリオが修正対象の障害シナリオをカバーしているか", against: rca_report }

  doc_audit_report:
    type: file
    produced_by: doc-audit
    consumed_by: []
    contract:
      verification:
        - { check: file_exists }
      validation: []

  review_findings:
    type: inline
    produced_by: review
    consumed_by: []
    contract:
      verification: []
      validation:
        - { question: "ユーザー承認済み findings が全て適用されているか", against: code_changes }

  merged_branch:
    type: inline
    produced_by: integrate
    consumed_by: []
    contract:
      verification:
        - { check: no_conflicts }
        - { check: no_uncommitted_changes }
      validation: []

  pr_url:
    type: inline
    produced_by: integrate
    consumed_by: []
    contract:
      verification: []
      validation: []

integrations:
  - skill: linear-sync
    enabled_by: --linear
    hooks:
      on_pipeline_start: [sync_workflow_start]
      on_phase_complete: [sync_phase_summary, sync_evidence]
      on_regate: [sync_regate]
      on_handover: [sync_session]
      on_pipeline_complete: [sync_complete]

phases:
  - id: rca
    phase_file: phases/rca.md

  - id: fix-plan
    phase_file: phases/fix-plan.md

  - id: fix-plan-review
    phase_file: phases/fix-plan-review.md

  - id: execute
    phase_file: phases/execute.md
    uses: [inner-loop]

  - id: accept-test
    phase_file: phases/accept-test.md
    skip_unless: --accept

  - id: doc-audit
    phase_file: phases/doc-audit.md
    skip_unless: --doc

  - id: review
    phase_file: phases/review.md

  - id: integrate
    phase_file: phases/integrate.md
    handover: never

regate:
  verification_chain: [execute, accept-test, review]

  review_findings:
    strategy_file: regate/review-findings.md
    rewind_to: execute

  test_failure:
    strategy_file: regate/test-failure.md
    rewind_to: execute

  audit_failure:
    strategy_file: regate/audit-failure.md
    rewind_to: current
    max_retries: 3

settings:
  default_handover: always
  max_phase_retries: 3
  context_budget:
    orchestrator: 150
    phase: 100
    references: 200
